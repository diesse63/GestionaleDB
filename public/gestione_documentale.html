<!DOCTYPE html>
<html lang="it" data-theme="emerald">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Documentale</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.9.4/dist/full.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-base-200 min-h-screen relative">

    <a href="/" class="btn btn-sm btn-neutral absolute top-4 left-4 shadow-md z-10">⬅ Torna alla Home</a>

    <div class="container mx-auto p-4 md:p-8 max-w-7xl mt-12">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10">
            <div>
                <h1 class="text-5xl font-black text-gray-900 uppercase italic text-blue-600">Gestione Documentale</h1>
                <p class="text-gray-500 font-bold uppercase text-xs mt-2 ml-1">Elenco link, visualizzazione e gestione</p>
            </div>

            <div>
                <label id="btn-new-doc" for="modal-doc" onclick="prepareNew()" class="btn bg-blue-600 border-none text-white shadow-lg rounded-xl uppercase">
                    <i data-lucide="plus-circle"></i> Nuovo
                </label>
            </div>
        </div>

        <div class="card bg-white shadow-2xl rounded-3xl overflow-hidden min-h-[420px]">
            <div class="overflow-x-auto">
                <table class="table w-full">
                    <thead class="bg-gray-900 text-white uppercase text-xs">
                        <tr>
                            <th class="py-6 px-8 whitespace-normal break-words">Area</th>
                            <th class="whitespace-normal break-words">Tipologia</th>
                            <th class="whitespace-normal break-words">Nome</th>
                            <th class="whitespace-normal break-words">Note</th>
                            <th class="text-center w-40 whitespace-normal break-words">Link</th>
                            <th class="text-right px-8 w-44 whitespace-normal break-words">Azione</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <input type="checkbox" id="modal-doc" class="modal-toggle" />
    <div class="modal">
        <div class="modal-box rounded-3xl p-8 max-w-3xl">
            <h3 id="modal-title" class="font-black text-2xl uppercase mb-6 border-b-4 border-blue-600 pb-2 text-blue-600 italic">Dettaglio Link</h3>

            <form id="docForm" class="space-y-4">
                <input type="hidden" id="doc-id">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="form-control">
                        <label class="label text-xs font-bold text-gray-400 uppercase">Area</label>
                        <select id="doc-id-tipologia" class="select select-bordered font-bold" required></select>
                    </div>
                    <div class="form-control">
                        <label class="label text-xs font-bold text-gray-400 uppercase">Tipologia</label>
                        <select id="doc-id-tipo" class="select select-bordered font-bold" required></select>
                    </div>
                </div>

                <div class="form-control">
                    <label class="label text-xs font-bold text-gray-400 uppercase">Nome</label>
                    <input type="text" id="doc-nome" required class="input input-bordered font-bold uppercase" placeholder="Nome">
                </div>

                <div class="form-control">
                    <label class="label text-xs font-bold text-gray-400 uppercase">Note</label>
                    <textarea id="doc-note" class="textarea textarea-bordered h-24 font-medium text-sm" placeholder="Note o descrizione"></textarea>
                </div>

                <div class="form-control bg-gray-50 p-4 rounded-xl border border-dashed border-gray-300">
                    <label class="label text-xs font-bold text-gray-400 uppercase">File Link (PDF)</label>
                    <div id="view-doc" class="hidden flex items-center justify-between bg-white p-2 rounded border mb-2">
                        <span id="name-doc" class="text-xs font-bold truncate max-w-[220px]"></span>
                        <div class="flex gap-1">
                            <a id="link-doc" href="#" target="_blank" class="btn btn-xs btn-info text-white"><i data-lucide="eye" class="w-3"></i></a>
                        </div>
                    </div>
                    <div id="input-container-doc">
                        <input type="file" id="doc-file" accept=".pdf" class="file-input file-input-bordered file-input-sm w-full" />
                    </div>
                    <input type="hidden" id="delete-documento-flag" value="false">
                </div>

                <div class="modal-action flex justify-between mt-8">
                    <button type="button" id="btn-delete-modal" onclick="deleteFromModal()" class="btn btn-error btn-outline hidden uppercase font-bold text-xs">Elimina</button>
                    <div class="flex gap-2 ml-auto">
                        <label for="modal-doc" class="btn btn-ghost uppercase text-xs font-bold">Chiudi</label>
                        <button type="button" id="btn-save" onclick="saveDocument()" class="btn bg-blue-600 border-none text-white font-bold uppercase px-8 text-xs shadow-lg">Salva</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="/assets/js/auth.js"></script>
    <script>
        let isAdminUser = false;
        let rowsCache = [];
        let tipologieCache = [];
        let tipiDocumentoCache = [];

        document.addEventListener('DOMContentLoaded', init);

        async function init() {
            try {
                const meRes = await fetch('/api/me');
                if (meRes.ok) {
                    const me = await meRes.json();
                    isAdminUser = me.isAdmin === true;
                }

                if (!isAdminUser) {
                    const btnNew = document.getElementById('btn-new-doc');
                    if (btnNew) btnNew.style.display = 'none';
                }

                await loadCombos();

                await loadDocuments();
                if (window.lucide) lucide.createIcons();
            } catch (e) {
                console.error('Errore inizializzazione:', e);
            }
        }

        async function loadCombos() {
            const [tipologieRes, tipiRes] = await Promise.all([
                fetch('/api/tipologie'),
                fetch('/api/documenti-tipi')
            ]);

            tipologieCache = tipologieRes.ok ? await tipologieRes.json() : [];
            tipiDocumentoCache = tipiRes.ok ? await tipiRes.json() : [];

            const selTipologia = document.getElementById('doc-id-tipologia');
            const selTipo = document.getElementById('doc-id-tipo');

            selTipologia.innerHTML = '<option value="" disabled selected>Seleziona area</option>' +
                tipologieCache.map(t => `<option value="${t.ID}">${escapeHtml(t.Tipologia)}</option>`).join('');

            selTipo.innerHTML = '<option value="" disabled selected>Seleziona tipologia</option>' +
                tipiDocumentoCache.map(t => `<option value="${t.ID}">${escapeHtml(String(t.Tipo))}</option>`).join('');
        }

        async function loadDocuments() {
            try {
                const res = await fetch('/api/documenti');
                const data = await res.json();
                rowsCache = (data || [])
                    .sort((a, b) => Number(b.ID || 0) - Number(a.ID || 0));
                renderTable(rowsCache);
            } catch (e) {
                console.error('Errore caricamento documenti:', e);
                renderTable([]);
            }
        }

        function renderTable(rows) {
            const tbody = document.getElementById('tableBody');
            if (!rows || rows.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-400 italic">Nessun link presente.</td></tr>';
                return;
            }

            tbody.innerHTML = rows.map(row => {
                const viewLink = row.Link
                    ? `<a href="${row.Link}" target="_blank" onclick="event.stopPropagation()" class="btn btn-xs btn-info text-white uppercase">Visualizza</a>`
                    : '<span class="text-gray-300">-</span>';

                const deleteBtn = isAdminUser
                    ? `<button onclick="event.stopPropagation(); deleteDocument(${row.ID})" class="btn btn-xs btn-error text-white uppercase">Elimina</button>`
                    : '<span class="text-xs text-gray-400 uppercase">Sola lettura</span>';

                return `
                    <tr class="hover:bg-blue-50 transition-colors border-b border-gray-100" ondblclick="openEdit(${row.ID})">
                        <td class="font-bold text-gray-600 py-6 px-8 text-sm align-top whitespace-normal break-words">${escapeHtml(row.Tipologia || '-')}</td>
                        <td class="font-bold text-gray-700 text-sm align-top pt-6 whitespace-normal break-words">${escapeHtml(String(row.Tipo || '-'))}</td>
                        <td class="font-black uppercase text-gray-800 text-sm tracking-wide align-top pt-6 whitespace-normal break-words">${escapeHtml(row.Nome || 'SENZA NOME')}</td>
                        <td class="font-medium text-gray-600 text-sm align-top pt-6 whitespace-normal break-words">${escapeHtml(row.Note || '-')}</td>
                        <td class="text-center align-top pt-5">${viewLink}</td>
                        <td class="text-right px-8 align-top pt-5">${deleteBtn}</td>
                    </tr>
                `;
            }).join('');

            if (window.lucide) lucide.createIcons();
        }

        function prepareNew() {
            if (!isAdminUser) return;

            document.getElementById('docForm').reset();
            document.getElementById('doc-id').value = '';
            document.getElementById('delete-documento-flag').value = 'false';

            document.getElementById('modal-title').innerText = 'Nuovo Link';
            document.getElementById('btn-delete-modal').classList.add('hidden');
            setReadOnly(false);
            resetFileUI();
        }

        function openEdit(id) {
            const row = rowsCache.find(r => r.ID == id) || null;
            if (!row) return;

            document.getElementById('doc-id').value = row.ID;
            document.getElementById('doc-id-tipologia').value = String(row.IDTipologia || '');
            document.getElementById('doc-id-tipo').value = String(row.IDTipo || '');
            document.getElementById('doc-nome').value = row.Nome || '';
            document.getElementById('doc-note').value = row.Note || '';
            document.getElementById('delete-documento-flag').value = 'false';
            setupFileUI(row.Link);

            if (isAdminUser) {
                document.getElementById('modal-title').innerText = 'Gestione Link';
                document.getElementById('btn-delete-modal').classList.remove('hidden');
                setReadOnly(false);
            } else {
                document.getElementById('modal-title').innerText = 'Visualizza Link';
                document.getElementById('btn-delete-modal').classList.add('hidden');
                setReadOnly(true);
            }

            document.getElementById('modal-doc').checked = true;
            if (window.lucide) lucide.createIcons();
        }

        function setReadOnly(isReadOnly) {
            document.getElementById('doc-id-tipologia').disabled = isReadOnly;
            document.getElementById('doc-id-tipo').disabled = isReadOnly;
            document.getElementById('doc-nome').disabled = isReadOnly;
            document.getElementById('doc-note').disabled = isReadOnly;
            document.getElementById('input-container-doc').style.display = isReadOnly ? 'none' : 'block';
            document.getElementById('btn-save').style.display = isReadOnly ? 'none' : 'inline-flex';
        }

        function setupFileUI(filePath) {
            const view = document.getElementById('view-doc');
            const input = document.getElementById('doc-file');
            const name = document.getElementById('name-doc');
            const link = document.getElementById('link-doc');

            if (filePath && String(filePath).length > 5) {
                view.classList.remove('hidden');
                name.innerText = String(filePath).split('/').pop();
                link.href = filePath;
                if (isAdminUser) input.classList.add('hidden');
            } else {
                view.classList.add('hidden');
                if (isAdminUser) input.classList.remove('hidden');
                input.value = '';
            }
        }

        function resetFileUI() {
            document.getElementById('view-doc').classList.add('hidden');
            const input = document.getElementById('doc-file');
            input.value = '';
            if (isAdminUser) input.classList.remove('hidden');
        }

        async function saveDocument() {
            if (!isAdminUser) return;

            const id = document.getElementById('doc-id').value;
            const idTipologia = document.getElementById('doc-id-tipologia').value;
            const idTipo = document.getElementById('doc-id-tipo').value;
            const nomeVal = document.getElementById('doc-nome').value.trim().toUpperCase();
            const noteVal = document.getElementById('doc-note').value;
            const file = document.getElementById('doc-file').files[0];

            if (!idTipologia || !idTipo || !nomeVal) {
                alert('Compilare Area, Tipologia e Nome.');
                return;
            }

            const formData = new FormData();
            formData.append('IDTipologia', idTipologia);
            formData.append('IDTipo', idTipo);
            formData.append('Nome', nomeVal);
            formData.append('Note', noteVal);
            if (file) formData.append('documenti', file);
            formData.append('deleteDocumento', 'false');

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/documenti/${id}` : '/api/documenti';

            try {
                const res = await fetch(url, { method, body: formData });
                const payload = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(payload.error || 'Errore salvataggio');
                document.getElementById('modal-doc').checked = false;
                await loadDocuments();
            } catch (e) {
                console.error(e);
                alert(e.message || 'Errore durante il salvataggio link.');
            }
        }

        async function deleteDocument(id) {
            if (!isAdminUser) return;
            if (!confirm('Eliminare definitivamente questo link?')) return;

            try {
                const res = await fetch(`/api/documenti/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Errore eliminazione');
                await loadDocuments();
            } catch (e) {
                console.error(e);
                alert('Errore durante l\'eliminazione.');
            }
        }

        async function deleteFromModal() {
            const id = document.getElementById('doc-id').value;
            if (!id) return;
            await deleteDocument(id);
            document.getElementById('modal-doc').checked = false;
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
    </script>
</body>
</html>
